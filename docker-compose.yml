services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FLASK_ENV: ${FLASK_ENV}
      CORS_ORIGINS: ${CORS_ORIGINS}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_API_KEY_1: ${GOOGLE_API_KEY_1}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}
      GEMINI_MODEL_RAG: ${GEMINI_MODEL_RAG}
      VOICE_STT_DEV_MOCK: ${VOICE_STT_DEV_MOCK}
      VOICE_DIALOG_TTS: ${VOICE_DIALOG_TTS}
      CHATBOT_TTS: ${CHATBOT_TTS}
      PROCEDURE_LINK_BASE: ${PROCEDURE_LINK_BASE}
      APPOINTMENT_SLOTS: ${APPOINTMENT_SLOTS}
      APPOINTMENT_MAX_PER_SLOT: ${APPOINTMENT_MAX_PER_SLOT}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --label-enable
    environment:
      WATCHTOWER_CLEANUP: "true"
